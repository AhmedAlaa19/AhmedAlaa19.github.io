<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Dev Portfolio</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #020617;
      --accent: #38bdf8;
      --text: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* THEMES */
    body.minimal { --bg:#ffffff; --card:#f1f5f9; --text:#0f172a; --accent:#2563eb; }
    body.scifi { --bg:#020617; --card:#020617; --text:#38bdf8; --accent:#22c55e; }
    body.gameui { --bg:#0f172a; --card:#1e293b; --text:#eab308; --accent:#f97316; }
    body.aaa { --bg:#000000; --card:#111; --text:#e5e5e5; --accent:#ef4444; }

    header {
      background: var(--card);
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      margin: 0 10px;
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .theme-buttons button {
      margin: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }

    section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    /* HERO */
    .hero {
      text-align: center;
      position: relative;
    }

    .hero img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .typing {
      border-right: 2px solid var(--accent);
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      animation: typing 3s steps(30), blink 0.5s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    /* PARTICLES */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    canvas { display: block; }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: var(--accent);
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>
<body class="scifi">

<canvas id="particles"></canvas>

<header>
  <h1>Ahmed Alaa</h1>
  <nav>
    <a href="#hero">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="theme-buttons">
    <button onclick="setTheme('minimal')">Minimal</button>
    <button onclick="setTheme('scifi')">Sci-Fi</button>
    <button onclick="setTheme('gameui')">Game UI</button>
    <button onclick="setTheme('aaa')">AAA</button>
  </div>
</header>

<section id="hero" class="hero">
  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Profile">
    <h2 class="typing">Game Developer | Unity Specialist</h2>
    <p>Building interactive systems, horror mechanics, and gameplay experiences.</p>

    <p>
      📍 Egypt<br>
      📧 your@email.com
    </p>

    <a href="#projects" class="btn">View Projects</a>
    <a href="#" class="btn">Download CV</a>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="card">
    <h3>Horror Game</h3>
    <img src="https://via.placeholder.com/800x400">
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>GitHub: github.com/yourprofile</p>
  </div>
</section>

<script>
function setTheme(theme) {
  document.body.className = theme;
}

// SIMPLE PARTICLES
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2 });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'white';
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    p.y += 0.2;
    if(p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
