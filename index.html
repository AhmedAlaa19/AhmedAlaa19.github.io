<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Dev Portfolio</title>

<style>
:root {
  --bg:#020617;
  --card:#020617;
  --accent:#22c55e;
  --text:#38bdf8;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header {
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  padding:15px;
  text-align:center;
  z-index:1000;
}

nav a {
  margin:0 10px;
  color:var(--accent);
  text-decoration:none;
}

section {
  padding:100px 20px;
  max-width:1000px;
  margin:auto;
}

.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img {
  width:140px;
  border-radius:50%;
}

.typing {
  border-right:2px solid var(--accent);
  white-space:nowrap;
  overflow:hidden;
  animation:typing 3s steps(30), blink .5s infinite;
}

@keyframes typing { from{width:0} to{width:100%} }
@keyframes blink {50%{border-color:transparent}}

.card {
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin:20px 0;
}

/* XP SYSTEM */
.stat {
  margin:20px 0;
}

.bar {
  width:100%;
  height:10px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  width:0;
  background:var(--accent);
  transition:1.5s;
}

</style>
</head>
<body>

<header>
  <h2>Ahmed Alaa</h2>
  <nav>
    <a href="#hero">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="hero" class="hero">
  <div>
    <img src="pprofile.jpg" alt="Profile Picture">
    <h1 class="typing">Game Developer | Unity</h1>
    <p>Building gameplay systems & horror mechanics</p>
  </div>
</section>

<section id="about">
  <h2>About Me</h2>
  <div class="card">
    <p>Unity Developer & Instructor focused on gameplay systems.</p>

    <div class="stat">
      <p>🎮 Projects</p>
      <div class="stat"><h3 data-target="15">0</h3></div>
    </div>

    <div class="stat">
      <p>⚙️ Experience</p>
      <div class="stat"><h3 data-target="3">0</h3></div>
    </div>

    <div class="stat">
      <p>🧠 Teaching</p>
      <div class="stat"><h3 data-target="200">0</h3></div>
    </div>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="card">
    <h3>Horror Game</h3>
    <img src="https://via.placeholder.com/800x400" width="100%">
    <iframe width="100%" height="250" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: your@email.com</p>
  </div>
</section>

<script>
// SCROLL TRIGGER XP
const fills = document.querySelectorAll('.fill');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const el = entry.target;
      el.style.width = el.dataset.progress + "%";
    }
  });
});

fills.forEach(f => observer.observe(f));
</script>

</body>
</html>
